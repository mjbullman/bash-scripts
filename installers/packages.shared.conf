# shellcheck shell=bash
# shellcheck disable=SC2034  # arrays are consumed by sourcing installer scripts
# Shared packages for both macOS and Linux.
# Each category is small and single-purpose. Platform-specific extras live in
# packages.macos.conf / packages.linux.conf as *_MACOS / *_LINUX arrays and are
# concatenated by the installer scripts.

ESSENTIALS=(
    curl                    # Transfer data from or to servers (HTTP, FTP, etc.)
    wget                    # Command-line downloader
    unzip                   # Extract ZIP archives
    fd                      # Fast, user-friendly alternative to 'find'
    ripgrep                 # Fast recursive content search (grep alternative)
    bat                     # 'cat' alternative with syntax highlighting
    fzf                     # Fuzzy finder for files, history, and more
    htop                    # Interactive process viewer
    neovim                  # Primary terminal editor
    tree-sitter             # Incremental parsing system (used by neovim plugins)
)

SHELL_ENHANCE=(
    starship                # Cross-shell prompt
    fastfetch               # System info with ASCII art
    bat-extras              # Extra utilities for bat (batman, batgrep, etc.)
    zsh-autosuggestions     # Fish-style command suggestions for zsh
    zsh-syntax-highlighting # Real-time syntax highlighting for zsh
)

TERMINAL_TUIS=(
    btop                    # Modern resource monitor TUI
    lazygit                 # Git TUI
    lazydocker              # Docker TUI
)

NETWORKING=(
    nmap                    # Network mapper / security scanner
    telnet                  # TCP/IP client for simple remote sessions
)

LANGUAGES=(
    go                      # Go compiler and tools
    python                  # Python interpreter
    ruby                    # Ruby interpreter
    php                     # PHP interpreter
    lua                     # Lua interpreter
    erlang                  # Erlang runtime
)

LANG_TOOLING=(
    fnm                     # Fast Node version manager
    pyenv                   # Python version manager
    rustup                  # Rust toolchain manager (provides rustc/cargo)
    maven                   # Java build/dependency tool
    composer                # PHP dependency manager
    luarocks                # Lua package manager
    stylua                  # Lua formatter
)

DEV_CORE=(
    git                     # Version control
    gh                      # GitHub CLI
    tmux                    # Terminal multiplexer
    git-delta               # Syntax-highlighting pager for git diff
    shellcheck              # Static analysis for shell scripts
)

CLOUD_CLI=(
    awscli                  # AWS CLI
    azure-cli               # Microsoft Azure CLI
    gcloud-cli              # Google Cloud CLI (cask)
)

DEVOPS=(
    docker                  # Container platform
    rabbitmq                # Message broker
    kubernetes-cli          # kubectl — Kubernetes CLI
)

DATABASES=(
    postgresql@16           # PostgreSQL 16
)

AI_CLI=(
    codex                   # OpenAI Codex CLI
    claude                  # Claude AI CLI
    opencode                # OpenCode AI coding assistant CLI
    gemini-cli              # Google Gemini CLI
)

FONTS=(
    noto-fonts              # Google's Noto font family
    noto-fonts-emoji        # Google's Noto emoji fonts
)
