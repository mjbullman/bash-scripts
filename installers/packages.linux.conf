# shellcheck shell=bash
# shellcheck disable=SC2034
# Linux-specific packages. These arrays *extend* the shared categories
# defined in packages.shared.conf — the installer concatenates them.

ESSENTIALS_LINUX=(
    gcc             # GNU C Compiler
    g++             # GNU C++ Compiler
    build-essential # Standard build toolchain
)

SHELL_ENHANCE_LINUX=(
    fastfetch       # System info with ASCII art
)
